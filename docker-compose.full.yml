services:
  caddy:
    image: caddy:2.8-alpine
    container_name: worktime-sync-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - api
    restart: unless-stopped

  frontend:
    build:
      context: ../WorkTime-Sync-Front
      args:
        NEXT_PUBLIC_USE_MOCKS: "false"
        NEXT_PUBLIC_API_URL: "/api/v1"
        NEXT_PUBLIC_MOCK_DELAY: "0"
    container_name: worktime-sync-frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_USE_MOCKS: "false"
      NEXT_PUBLIC_API_URL: /api/v1
      SERVER_API_URL: http://api:8000/api/v1
      BACKEND_ORIGIN: http://api:8000
    expose:
      - "3000"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build: .
    container_name: worktime-sync-api
    env_file:
      - .env.production
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: worktime-sync-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
