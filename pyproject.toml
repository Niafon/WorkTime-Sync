[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
markers = [
    "no_auth_override: disable default current-user dependency override",
]

[tool.ruff]
target-version = "py312"
line-length = 100
exclude = [
    ".git",
    ".pytest_cache",
    ".venv",
    "s",
    "venv",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "ASYNC"]

[tool.mypy]
python_version = "3.12"
plugins = ["pydantic.mypy", "sqlalchemy.ext.mypy.plugin"]
strict = true
exclude = "(venv|s)/"

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_decorators = false
